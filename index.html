<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy Roofing — TV Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan:     #abe1fa;
    --blue:     #2c2f75;
    --blue-dim: rgba(44,47,117,0.88);
    --dark:     #07080f;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }

  /* ══════════════════════════════
     TOP BAR  — NOT sticky, scrolls with content
  ══════════════════════════════ */
  #top-bar {
    position: relative;
    width: 100%;
    height: 48px;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 200;
    border-bottom: 2px solid var(--cyan);
    flex-shrink: 0;
  }

  #top-bar .brand {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--cyan);
    text-transform: uppercase;
    min-width: 160px;
  }

  #top-bar .center-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  #top-bar .period-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  #top-bar .panel-title {
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #top-bar .clock {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    font-variant-numeric: tabular-nums;
    min-width: 160px;
    text-align: right;
  }

  /* ══════════════════════════════
     SEGMENT TABS  (right side, fixed overlay)
  ══════════════════════════════ */
  #segment-tabs {
    position: fixed;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 300;
  }

  .seg-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .seg-tab-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cyan);
    background: var(--blue);
    border: 1px solid rgba(171,225,250,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    white-space: nowrap;
    opacity: 0.4;
    transition: opacity 0.4s, border-color 0.4s;
  }

  .seg-tab-dots {
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
  }

  .seg-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--blue);
    border: 1.5px solid rgba(171,225,250,0.25);
    transition: background 0.4s, border-color 0.4s;
  }

  .seg-tab.active .seg-tab-label {
    opacity: 1;
    border-color: var(--cyan);
  }

  .seg-dot.active {
    background: var(--cyan);
    border-color: var(--cyan);
  }

  /* ══════════════════════════════
     PROGRESS BAR
  ══════════════════════════════ */
  #progress-bar {
    position: fixed;
    bottom: 0; left: 0;
    height: 3px;
    background: var(--cyan);
    width: 0%;
    transition: width 0.3s linear;
    z-index: 400;
  }

  /* ══════════════════════════════
     CONTROLS
  ══════════════════════════════ */
  #controls {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 400;
    background: var(--blue-dim);
    border: 1px solid rgba(171,225,250,0.3);
    border-radius: 40px;
    padding: 7px 18px;
    backdrop-filter: blur(10px);
    opacity: 0;
    transition: opacity 0.4s;
  }

  body:hover #controls { opacity: 1; }
  #controls.always-show { opacity: 1; }

  .ctrl-btn {
    background: none;
    border: 1px solid rgba(171,225,250,0.3);
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--cyan);
    transition: background 0.2s, transform 0.1s;
  }
  .ctrl-btn:hover { background: rgba(171,225,250,0.12); }
  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn.primary {
    width: 44px; height: 44px;
    border-color: rgba(171,225,250,0.5);
    background: rgba(171,225,250,0.08);
  }

  #paused-badge {
    display: none;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--cyan);
    text-transform: uppercase;
    padding: 0 6px;
  }
  #paused-badge.show { display: block; }

  /* ══════════════════════════════
     VIEWPORT + IFRAME
  ══════════════════════════════ */
  #viewport {
    position: fixed;
    top: 48px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    background: var(--dark);
  }

  #dash-frame {
    position: absolute;
    top: 0; left: 0;
    border: none;
    width: 1920px;
    height: 5000px;
    transform-origin: top left;
    transform: scale(1);
    transition: top 30s cubic-bezier(0.45, 0, 0.2, 1);
  }

  /* ══════════════════════════════
     TRANSITION OVERLAY  — 7 seconds
  ══════════════════════════════ */
  #transition-overlay {
    position: fixed;
    inset: 0;
    background: var(--blue);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #transition-overlay.show { opacity: 1; pointer-events: all; }

  #overlay-sub {
    font-size: 12px;
    color: var(--cyan);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  #overlay-main {
    font-size: 40px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.03em;
  }
  #overlay-detail {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.06em;
    margin-top: 4px;
  }
  #overlay-brand {
    font-size: 12px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 18px;
    border: 1px solid rgba(171,225,250,0.35);
    padding: 5px 16px;
    border-radius: 4px;
  }

  /* ══════════════════════════════
     TOAST
  ══════════════════════════════ */
  #toast {
    position: fixed;
    left: 18px; bottom: 18px;
    background: var(--blue);
    border: 1px solid rgba(171,225,250,0.4);
    color: var(--cyan);
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 5px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s, transform 0.35s;
    z-index: 350;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Top bar — NOT fixed, sits above the iframe naturally -->
<div id="top-bar">
  <div class="brand">Legacy Roofing</div>
  <div class="center-info">
    <div class="period-title" id="period-title">Loading…</div>
    <div class="panel-title"  id="panel-title">—</div>
  </div>
  <div class="clock" id="clock">—</div>
</div>

<!-- Right-side segment tabs (these stay fixed as a nav indicator) -->
<div id="segment-tabs"></div>

<!-- Iframe lives in a fixed viewport below the top bar -->
<div id="viewport">
  <iframe id="dash-frame" src="about:blank" scrolling="no"></iframe>
</div>

<!-- Progress bar -->
<div id="progress-bar"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl-btn" id="btn-back" title="Previous panel">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="19 20 9 12 19 4 19 20"></polygon>
      <line x1="5" y1="19" x2="5" y2="5"></line>
    </svg>
  </button>
  <button class="ctrl-btn primary" id="btn-pause" title="Pause / Resume">
    <svg id="icon-pause" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
      <rect x="6" y="4" width="4" height="16" rx="1"></rect>
      <rect x="14" y="4" width="4" height="16" rx="1"></rect>
    </svg>
    <svg id="icon-play" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="display:none;margin-left:2px">
      <polygon points="5 3 19 12 5 21 5 3"></polygon>
    </svg>
  </button>
  <button class="ctrl-btn" id="btn-skip" title="Next panel">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5 4 15 12 5 20 5 4"></polygon>
      <line x1="19" y1="5" x2="19" y2="19"></line>
    </svg>
  </button>
  <span id="paused-badge">Paused</span>
</div>

<!-- Transition overlay -->
<div id="transition-overlay">
  <div id="overlay-sub">Now Showing</div>
  <div id="overlay-main">—</div>
  <div id="overlay-detail">—</div>
  <div id="overlay-brand">Legacy Roofing Performance</div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   CONFIGURATION
   — Update SECTION_OFFSETS with your real window.scrollY values
══════════════════════════════════════════════════════ */

const BASE = 'https://phpstack-1482823-5634347.cloudwaysapps.com/dashboard_2026.php';

// Steps to get these numbers:
// 1. Open your dashboard URL in Chrome
// 2. Press F12 → click Console tab
// 3. Scroll until the TOP of each section is at the top of the screen
// 4. Type:  window.scrollY  and press Enter
// 5. Replace the numbers below with what you get
const SECTION_OFFSETS = {
  overview:    0,     // always 0 — top of the page
  commercial:  1200,  // ← REPLACE with your Commercial Replacement scrollY
  service:     2400,  // ← REPLACE with your Commercial Service scrollY
  territory:   3600   // ← REPLACE with your Territory Performance scrollY
};

const HOLD_MS       = 15000;  // 15 seconds hold on each panel
const SCROLL_MS     = 30000;  // 30 seconds smooth scroll between panels
const TRANSITION_MS = 7000;   // 7 seconds on the between-period banner screen
const REFRESH_MS    = 4 * 60 * 60 * 1000; // auto-reload data every 4 hours

// Three periods — parameters match your PHP dashboard exactly
const PERIODS = [
  {
    tabLabel:    'APR',
    title:       'Monthly Overview: April',
    overlayMain: 'April 2026',
    overlayDetail: 'Monthly  ·  Office: All',
    params: { office: 'All', period: 'month', month: 4, quarter: 1, year: 2026 }
  },
  {
    tabLabel:    'Q1',
    title:       'Quarterly Overview: Q1',
    overlayMain: 'Q1 2026',
    overlayDetail: 'Quarterly  ·  Office: All',
    params: { office: 'All', period: 'quarter', month: 3, quarter: 1, year: 2026 }
  },
  {
    tabLabel:    'YTD',
    title:       'Year to Date: 2026',
    overlayMain: '2026',
    overlayDetail: 'Year to Date  ·  Office: All',
    params: { office: 'All', period: 'year', month: 4, quarter: 4, year: 2026 }
  }
];

// Four panels shown for each period
const PANELS = [
  { key: 'overview',   label: 'Sales Overview' },
  { key: 'commercial', label: 'Commercial Replacement' },
  { key: 'service',    label: 'Commercial Service' },
  { key: 'territory',  label: 'Territory Performance' }
];

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */

let pIdx      = 0;   // which period (0=monthly, 1=quarterly, 2=ytd)
let panIdx    = 0;   // which panel within that period
let isPaused  = false;
let holdTimer = null;
let progInt   = null;
let holdStart = 0;
let timeLeft  = HOLD_MS;
let loadedAt  = 0;
let zoom      = 1;

/* ══════════════════════════════════════════════════════
   ELEMENTS
══════════════════════════════════════════════════════ */

const frame       = document.getElementById('dash-frame');
const viewport    = document.getElementById('viewport');
const progBar     = document.getElementById('progress-bar');
const periodTit   = document.getElementById('period-title');
const panelTit    = document.getElementById('panel-title');
const clockEl     = document.getElementById('clock');
const tabsEl      = document.getElementById('segment-tabs');
const toast       = document.getElementById('toast');
const overlay     = document.getElementById('transition-overlay');
const overlayM    = document.getElementById('overlay-main');
const overlayD    = document.getElementById('overlay-detail');
const controls    = document.getElementById('controls');
const btnPause    = document.getElementById('btn-pause');
const btnSkip     = document.getElementById('btn-skip');
const btnBack     = document.getElementById('btn-back');
const iconPause   = document.getElementById('icon-pause');
const iconPlay    = document.getElementById('icon-play');
const pausedBadge = document.getElementById('paused-badge');

/* ══════════════════════════════════════════════════════
   ZOOM — scales iframe to fill TV screen exactly
   Renders at 1920px wide then scales down to viewport
══════════════════════════════════════════════════════ */

function applyZoom() {
  const vw = viewport.clientWidth;
  zoom = vw / 1920;
  frame.style.transform = `scale(${zoom})`;
  // Make iframe tall enough to hold all panels after scaling
  frame.style.height = Math.ceil((viewport.clientHeight / zoom) * 4) + 'px';
}

window.addEventListener('resize', applyZoom);

/* ══════════════════════════════════════════════════════
   CLOCK
══════════════════════════════════════════════════════ */

function tick() {
  clockEl.textContent = new Date().toLocaleTimeString('en-US',
    { hour: '2-digit', minute: '2-digit', hour12: true });
}
setInterval(tick, 1000);
tick();

/* ══════════════════════════════════════════════════════
   BUILD SIDE TABS
══════════════════════════════════════════════════════ */

function buildTabs() {
  tabsEl.innerHTML = '';
  PERIODS.forEach((p, pi) => {
    const tab = document.createElement('div');
    tab.className = 'seg-tab';
    tab.id = `tab-${pi}`;

    const lbl = document.createElement('div');
    lbl.className = 'seg-tab-label';
    lbl.textContent = p.tabLabel;
    tab.appendChild(lbl);

    const dotsWrap = document.createElement('div');
    dotsWrap.className = 'seg-tab-dots';
    PANELS.forEach((_, di) => {
      const d = document.createElement('div');
      d.className = 'seg-dot';
      d.id = `dot-${pi}-${di}`;
      dotsWrap.appendChild(d);
    });
    tab.appendChild(dotsWrap);
    tabsEl.appendChild(tab);
  });
}

function updateTabs() {
  PERIODS.forEach((_, pi) => {
    document.getElementById(`tab-${pi}`)
      .classList.toggle('active', pi === pIdx);
    PANELS.forEach((_, di) => {
      document.getElementById(`dot-${pi}-${di}`)
        .classList.toggle('active', pi === pIdx && di === panIdx);
    });
  });
}

/* ══════════════════════════════════════════════════════
   URL BUILDER
══════════════════════════════════════════════════════ */

function buildURL(params) {
  return `${BASE}?${new URLSearchParams({ ...params, _t: Date.now() })}`;
}

/* ══════════════════════════════════════════════════════
   SCROLL — moves iframe upward, accounting for zoom scale
══════════════════════════════════════════════════════ */

function scrollTo(offset, dur) {
  frame.style.transition = `top ${dur}ms cubic-bezier(0.45, 0, 0.2, 1)`;
  frame.style.top = `-${offset * zoom}px`;
  try { frame.contentWindow.scrollTo({ top: offset, behavior: 'smooth' }); } catch(e) {}
}

/* ══════════════════════════════════════════════════════
   PROGRESS BAR
══════════════════════════════════════════════════════ */

function startProg(duration) {
  holdStart = Date.now();
  clearInterval(progInt);
  const startPct = 100 - (duration / HOLD_MS) * 100;
  progInt = setInterval(() => {
    const pct = Math.min(100,
      startPct + ((Date.now() - holdStart) / duration) * (100 - startPct));
    progBar.style.width = pct + '%';
    if (pct >= 100) clearInterval(progInt);
  }, 60);
}

function stopProg() { clearInterval(progInt); }

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */

function showToast(txt) {
  toast.textContent = txt;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

/* ══════════════════════════════════════════════════════
   LOAD PERIOD INTO IFRAME
══════════════════════════════════════════════════════ */

function loadPeriod(pi, cb) {
  frame.style.transition = 'none';
  frame.style.top = '0px';
  frame.src = buildURL(PERIODS[pi].params);
  loadedAt = Date.now();
  frame.onload = () => setTimeout(cb, 1400);
}

/* ══════════════════════════════════════════════════════
   TRANSITION OVERLAY — shows for TRANSITION_MS (7 seconds)
══════════════════════════════════════════════════════ */

function showTransition(period, cb) {
  overlayM.textContent = period.overlayMain;
  overlayD.textContent = period.overlayDetail;
  overlay.classList.add('show');
  // Hold for 7 seconds, then fade out and call cb
  setTimeout(() => {
    overlay.classList.remove('show');
    setTimeout(cb, 700); // wait for fade-out before continuing
  }, TRANSITION_MS);
}

/* ══════════════════════════════════════════════════════
   PAUSE / RESUME
══════════════════════════════════════════════════════ */

function setPaused(val) {
  isPaused = val;
  iconPause.style.display = val ? 'none'  : 'block';
  iconPlay.style.display  = val ? 'block' : 'none';
  pausedBadge.classList.toggle('show', val);
  controls.classList.toggle('always-show', val);

  if (val) {
    timeLeft = Math.max(500, timeLeft - (Date.now() - holdStart));
    clearTimeout(holdTimer);
    stopProg();
    const cur = getComputedStyle(frame).top;
    frame.style.transition = 'none';
    frame.style.top = cur;
  } else {
    holdStart = Date.now();
    startProg(timeLeft);
    holdTimer = setTimeout(() => { timeLeft = HOLD_MS; advance(); }, timeLeft);
  }
}

btnPause.addEventListener('click', () => setPaused(!isPaused));

/* ══════════════════════════════════════════════════════
   SKIP / BACK BUTTONS
══════════════════════════════════════════════════════ */

btnSkip.addEventListener('click', () => {
  if (isPaused) setPaused(false);
  clearTimeout(holdTimer);
  timeLeft = HOLD_MS;
  advance();
});

btnBack.addEventListener('click', () => {
  if (isPaused) setPaused(false);
  clearTimeout(holdTimer);
  timeLeft = HOLD_MS;

  if (panIdx > 0) {
    panIdx--;
    runPanel();
  } else {
    pIdx = (pIdx - 1 + PERIODS.length) % PERIODS.length;
    panIdx = PANELS.length - 1;
    showTransition(PERIODS[pIdx], () => {
      loadPeriod(pIdx, () => runPanel());
    });
  }
});

/* ══════════════════════════════════════════════════════
   ADVANCE — move to next panel or next period
══════════════════════════════════════════════════════ */

function advance() {
  clearTimeout(holdTimer);
  const nextPan = panIdx + 1;

  if (nextPan < PANELS.length) {
    panIdx = nextPan;
    runPanel();
  } else {
    const nextP = (pIdx + 1) % PERIODS.length;
    panIdx = 0;
    showTransition(PERIODS[nextP], () => {
      pIdx = nextP;
      loadPeriod(pIdx, () => runPanel());
    });
  }
}

/* ══════════════════════════════════════════════════════
   RUN PANEL — core step: scroll then hold
══════════════════════════════════════════════════════ */

function runPanel() {
  clearTimeout(holdTimer);
  isPaused  = false;
  timeLeft  = HOLD_MS;
  iconPause.style.display = 'block';
  iconPlay.style.display  = 'none';
  pausedBadge.classList.remove('show');
  controls.classList.remove('always-show');

  const period = PERIODS[pIdx];
  const panel  = PANELS[panIdx];
  const offset = SECTION_OFFSETS[panel.key];

  periodTit.textContent = period.title;
  panelTit.textContent  = panel.label;
  updateTabs();

  // Reset progress, begin 30-second scroll
  progBar.style.width = '0%';
  scrollTo(offset, SCROLL_MS);

  // After scroll finishes, hold for 15 seconds
  setTimeout(() => {
    showToast(panel.label);
    startProg(HOLD_MS);
    holdStart = Date.now();
    holdTimer = setTimeout(() => {
      timeLeft = HOLD_MS;
      advance();
    }, HOLD_MS);
  }, SCROLL_MS + 300);
}

/* ══════════════════════════════════════════════════════
   AUTO REFRESH every 4 hours
══════════════════════════════════════════════════════ */

setInterval(() => {
  if (isPaused) return;
  if (Date.now() - loadedAt > REFRESH_MS) {
    loadPeriod(pIdx, () => runPanel());
  }
}, 60000);

/* ══════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════ */

buildTabs();
applyZoom();

showTransition(PERIODS[0], () => {
  loadPeriod(0, () => runPanel());
});
</script>
</body>
</html>
